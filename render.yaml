services:
  # Backend Web Service
  - type: web
    name: fince-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Provide your MongoDB connection string in Render dashboard

  # Frontend Web Service
  - type: web
    name: fince-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm install -g serve && serve -s dist -l 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://fince-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
