services:
  # Backend Web Service
  - type: web
    name: fince-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Provide your MongoDB connection string in Render dashboard

  # Frontend Static Site
  - type: web
    name: fince-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Rewrites all paths to index.html to support single-page application routing (React Router)
      - type: rewrite
        source: /*
        destination: /index.html
